<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">        
        <title>Queue Management</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" >
        <link rel="stylesheet" href="../Patients_WebPages/bookAppointments.css">
        <link rel="stylesheet" href="../Login/bookAppointments.css">     
        <link rel="stylesheet" href="Staff.css">
        <script type="module" src="Queues.js"></script>
        
    </head>

    <body>
    <!-- Top navigation bar -->
    <header class="top-bar">
        <nav class="logo">
        <!-- Logo icon (green square with plus sign created with CSS) -->
        <span class="logo-icon"></span>
        <span class="logo-name" style="vertical-align: middle;">Care Queue</span>
        </nav>
    </header>

    <section class="container">

    <!-- Sidebar -->
    <aside>
        <ul>
           <li>
                <a href="StaffDashboard.html">
                    <i class="material-icons">bar_chart</i>
                    Dashboard
                </a>
            </li>
            <li>
                <a href="Appointments.html">
                    <i class="material-icons">event</i>
                    Manage Appointment
                </a>
            </li>
            <li>
                <a class = "active" href="Queues.html">
                    <i class="material-icons">groups</i>
                    Queue Management
                </a>
            </li>
            <li>
                <a href="Analytics.html">
                    <i class="fa-solid fa-chart-line"></i>
                    Analytics
                </a>
            </li>
            <li>
                <a href="WalkIns.html">
                    <i class="material-icons">directions_walk</i>
                    Walk-in
                </a>
            </li>

            <li>
                <a href="#">
                    <i class="fa-solid fa-bell"></i>
                    Notifications
                </a>
            </li>
        </ul>

        <section class="user-Section">
            <i class="fa-solid fa-user" style="padding: 5px; color: #185FA5;"></i>
            <section>
                <p class="name-Surname">Name Surname</p>
                <p class="user-Identity" style="padding: 3px">Staff</p>
            </section>
        </section>
    </aside>
        <main >
            <h1>Manage Queue </h1>
            <!-- ── Day Stats ─────────────────────────────────────── -->
            <section class="day-stats">
                <div class="stat-card">
                    <span class="stat-value" id="stat-total">—</span>
                    <span class="stat-label">Total today</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="stat-inqueue">—</span>
                    <span class="stat-label">In queue now</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="stat-avgwait">—</span>
                    <span class="stat-label">Avg wait</span>
                    <span class="stat-sub" id="stat-avgwait-trend"></span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="stat-completed">—</span>
                    <span class="stat-label">Completed</span>
                </div>
            </section>
            <h2>Appointments</h2>
            <!-- Upcoming Appointments -->
            <section class="appt-section">
                <ul id="upcoming"></ul>
            </section>

        </main>
    </section>
    </body>
</html>
