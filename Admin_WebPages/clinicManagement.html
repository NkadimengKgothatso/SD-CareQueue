<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Care Queue | Admin - Clinic Management</title>
    <!-- Base admin portal styles first -->
    <link rel="stylesheet" href="/Admin_WebPages/admin.css">
    <!-- Clinic-specific styles layered on top (cards, search bar, clinic chips) -->
    <link rel="stylesheet" href="/Admin_WebPages/clinicManagement.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="admin-container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon"></div>
                    <span class="logo-name">Care Queue</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-item" onclick="window.location.href='/Admin_WebPages/Dashboard.html'">
                    <div class="nav-dot"></div>
                    <span>Dashboard</span>
                </div>
                <div class="nav-item active" onclick="window.location.href='/Admin_WebPages/ClinicManagement.html'">
                    <div class="nav-dot"></div>
                    <span>Clinic Management</span>
                </div>
                <div class="nav-item" onclick="window.location.href='/Admin_WebPages/StaffManagement.html'">
                    <div class="nav-dot"></div>
                    <span>Staff Management</span>
                </div>
                <div class="nav-item" onclick="window.location.href='/Admin_WebPages/Analytics.html'">
                    <div class="nav-dot"></div>
                    <span>Analytics</span>
                </div>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="adminAvatar">AD</div>
                    <div class="user-details">
                        <div class="user-name" id="adminName">Admin</div>
                        <div class="user-email" id="adminEmail">admin@email.com</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">Clinic Management</h1>
                <p class="page-subtitle">Add, edit, or remove clinics from the system</p>
            </div>

        <section class="content">
            <p class="title"> Manage Clinics</p>
            <section class="search-Bar">
                <i class="fa-solid fa-magnifying-glass-location" style="color: var(--color-brand);"></i>
                <input id="clinicSearch" type="search" placeholder="Search clinic by name or location">
            </section>

            <!-- Clinics card -->
            <section class="clinicsCard">
                <section class="clinicCardHeader">
                    <p class="section-label" style="margin-right: auto; flex: 1;">CLINICS</p>
                    <button class="addBtn">+ Add Clinic</button>
                </section>
                <section class="clinics"></section>
            </section>
        </main>
    </div>

    <!-- Add Clinic Modal -->
    <section class="modal" id="clinicModal">
        <section class="modal-content">
            <span class="close-btn">&times;</span>
            <h3>Add Clinic</h3>
            <form class="clinicForm">
                <input type="text" placeholder="Clinic Name" class="form-control" id="clinicName" required>
                <input type="text" placeholder="Location" class="form-control" id="Location" required>
                <select required>
                    <option value="" disabled selected>Select Province</option>
                    <option>Gauteng</option>
                    <option>Western Cape</option>
                    <option>Eastern Cape</option>
                    <option>KwaZulu-Natal</option>
                    <option>Free State</option>
                    <option>Limpopo</option>
                    <option>Mpumalanga</option>
                    <option>North West</option>
                    <option>Northern Cape</option>
                </select>
                

                <select id="clinicStatus" required>
                    <option value="Active">Active</option>
                    <option value="Closed">Closed</option>
                    <option value="Busy">Busy</option>
                </select>
                <button type="submit">Add Clinic</button>
            </form>

        </section>
    </section>


    <section class="ManageModal" id="ManageClinicModal">
        <section class="modal-content">

            <span class="close-btn">&times;</span>

            <h3>Manage clinic</h3>

            <form class="clinicForm">
                <input type="text" placeholder="Clinic Name" class="form-control" id="ManageClinicName" required>
                <input type="text" placeholder="Location" class="form-control" id="ManageLocation" required>

                <select required>
                    <option value="" disabled selected>Select Province</option>
                    <option>Gauteng</option>
                    <option>Western Cape</option>
                    <option>Eastern Cape</option>
                    <option>KwaZulu-Natal</option>
                    <option>Free State</option>
                    <option>Limpopo</option>
                    <option>Mpumalanga</option>
                    <option>North West</option>
                    <option>Northern Cape</option>
                </select>

                <button type="submit">Add Clinic</button>
            </form>
        </section>
    </section>

    <script type="module" src="/Admin_WebPages/clinicManagement.js"></script>
</body>
</html>
