<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Care Queue | Admin - Staff Management</title>
    <link rel="stylesheet" href="/Admin_WebPages/admin.css">

</head>
<body>
    <section class="admin-container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <section class="sidebar-header">
                <section class="logo">
                    <section class="logo-icon"></section>
                    <span class="logo-name">Care Queue</span>
                </section>
            </section>
            <nav class="sidebar-nav">
                <section class="nav-item" onclick="window.location.href='/Admin_WebPages/Dashboard.html'">
                    <section class="nav-dot"></section>
                    <span>Dashboard</span>
                </section>
                <section class="nav-item" onclick="window.location.href='/Admin_WebPages/clinicManagement.html'">
                    <section class="nav-dot"></section>
                    <span>Clinic Management</span>
                </section>
                <section class="nav-item active" onclick="window.location.href='/Admin_WebPages/StaffManagement.html'">
                    <section class="nav-dot"></section>
                    <span>Staff Management</span>
                </section>
                <section class="nav-item" onclick="window.location.href='/Admin_WebPages/Analytics.html'">
                    <section class="nav-dot"></section>
                    <span>Analytics</span>
                </section>
            </nav>
            <section class="sidebar-footer">
                <section class="user-info">
                    <section class="user-avatar" id="adminAvatar">AD</section>
                    <section class="user-details">
                        <section class="user-name" id="adminName">Admin</section>
                        <section class="user-email" id="adminEmail">admin@email.com</section>
                    </section>
                </section>
            </section>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <section class="page-header">
                <h1 class="page-title">Staff Management</h1>
                <p class="page-subtitle">Add or remove clinic staff members</p>
            </section>

            <section class="card">
                <section class="card-header">
                    <p class="card-title">All Staff Members (<span id="staffCount">0</span>)</p>
                    <button class="btn btn-primary" onclick="openInviteModal()">+ Invite Staff</button>
                </section>

                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Assigned Clinic</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="staffTableBody">
                        <tr>
                            <td colspan="4" style="text-align:center; padding:40px; color:var(--color-text-tertiary);">
                                Loading...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>
    </section>

    <!-- Invite Staff Modal -->
    <section id="inviteModal" class="modal-overlay" style="display:none;">
        <section class="modal">
            <section class="modal-header">Invite New Staff Member</section>
            <section class="modal-body">
                <section class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="staffName" class="form-input" placeholder="e.g. Kea Modiakgotla">
                </section>
                <section class="form-group">
                    <label>Email</label>
                    <input type="email" id="staffEmail" class="form-input" placeholder="e.g. kea@clinic.co.za">
                </section>
                <section class="form-group">
                    <label>Assigned Clinic</label>
                    <select id="staffClinic" class="form-input">
                        <option value="">Select Clinic</option>
                    </select>
                </section>
            </section>
            <section class="modal-footer">
                <button class="btn" onclick="closeInviteModal()">Cancel</button>
                <button class="btn btn-primary" onclick="addStaff()">Add Staff Member</button>
            </section>
        </section>
    </section>

    <p id="toast" class="toast"></p>

    <script src="staffLogic.js"></script>
    <script type="module" src="/Admin_WebPages/StaffManagement.js"></script>
</body>
</html>
