<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Care Queue | Admin - Staff Management</title>
    <link rel="stylesheet" href="/Admin_WebPages/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="admin-container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon"></div>
                    <span class="logo-name">Care Queue</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-item" onclick="window.location.href='/Admin_WebPages/Dashboard.html'">
                    <div class="nav-dot"></div>
                    <span>Dashboard</span>
                </div>
                <div class="nav-item" onclick="window.location.href='/Admin_WebPages/ClinicManagement.html'">
                    <div class="nav-dot"></div>
                    <span>Clinic Management</span>
                </div>
                <div class="nav-item active" onclick="window.location.href='/Admin_WebPages/StaffManagement.html'">
                    <div class="nav-dot"></div>
                    <span>Staff Management</span>
                </div>
                <div class="nav-item" onclick="window.location.href='/Admin_WebPages/Analytics.html'">
                    <div class="nav-dot"></div>
                    <span>Analytics</span>
                </div>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="adminAvatar">AD</div>
                    <div class="user-details">
                        <div class="user-name" id="adminName">Admin</div>
                        <div class="user-email" id="adminEmail">admin@email.com</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">Staff Management</h1>
                <p class="page-subtitle">Add or remove clinic staff members</p>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-title">All Staff Members (<span id="staffCount">0</span>)</div>
                    <button class="btn btn-primary" onclick="openInviteModal()">+ Invite Staff</button>
                </div>

                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Assigned Clinic</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="staffTableBody">
                        <tr>
                            <td colspan="4" style="text-align:center; padding:40px; color:var(--color-text-tertiary);">
                                Loading...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Invite Staff Modal -->
    <div id="inviteModal" class="modal-overlay" style="display:none;">
        <div class="modal">
            <div class="modal-header">Invite New Staff Member</div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="staffName" class="form-input" placeholder="e.g. Thabo Nkosi">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="staffEmail" class="form-input" placeholder="e.g. thabo@clinic.co.za">
                </div>
                <div class="form-group">
                    <label>Assigned Clinic</label>
                    <select id="staffClinic" class="form-input">
                        <option value="">Select Clinic</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeInviteModal()">Cancel</button>
                <button class="btn btn-primary" onclick="addStaff()">Add Staff Member</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module" src="/Admin_WebPages/StaffManagement.js"></script>
</body>
</html>
