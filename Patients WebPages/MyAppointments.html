<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="myappointments.css">
</head>
<body>

    <!-- Top navigation bar -->
    <header class="top-bar">
        <nav class="logo">
        <!-- Logo icon (green square with plus sign created with CSS) -->
        <span class="logo-icon"></span>
        <span class="logo-name" style="vertical-align: middle;">Care Queue</span>
        </nav>
    </header>

    <section class="container">

        <!-- Sidebar -->
    <aside>
        <ul>
            <li>
                <a href="#">
                    <i class="fa-solid fa-chart-bar"></i>
                    Dashboard
                </a>
            </li>
            <li>
                <a href="#">
                    <i class="fa-solid fa-calendar-plus"></i>
                    Book Appointment
                </a>
            </li>
            <li>
                <a href="#">
                    <i class="fa-solid fa-calendar-check"></i>
                    My Appointments
                </a>
            </li>
            <li>
                <a href="#">
                    <i class="fa-solid fa-users"></i>
                    Queue Status
                </a>
            </li>
            <li>
                <a href="#">
                    <i class="fa-solid fa-location-dot"></i>
                    Find Clinic
                </a>
            </li>

            <li>
                <a href="#">
                    <i class="fa-solid fa-bell"></i>
                    Notifications
                </a>
            </li>
        </ul>

        <section class="user-Section">
            <i class="fa-solid fa-user" style="padding: 5px;"></i>
            <section>
                <p class="name-Surname">Name Surname</p>
                <p class="user-Identity" style="padding: 3px">Patient</p>
            </section>
        </section>
    </aside>

        <main>
            <h2>My Appointments</h2>
        </main>

    </section>
