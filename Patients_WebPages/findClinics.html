<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Clinic Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="findClinic.css">
    <link rel="stylesheet" href="myappointments.css">
</head>
<body>

    <!-- Top navigation bar -->
    <header class="top-bar">
        <nav class="logo">
        <!-- Logo icon (green square with plus sign created with CSS) -->
        <span class="logo-icon"></span>
        <span class="logo-name" style="vertical-align: middle;">Care Queue</span>
        </nav>
    </header>

    <section class="container">

    <!-- Sidebar -->
    <aside>
        <ul>
            <li>
                <a href="PatientDashboard.html">
                    <i class="fa-solid fa-chart-bar"></i>
                    Dashboard
                </a>
            </li>
            <li>
                <a href="BookAppointments.html">
                    <i class="fa-solid fa-calendar-plus"></i>
                    Book Appointment
                </a>
            </li>
            <li>
                <a href="MyAppointments.html">
                    <i class="fa-solid fa-calendar-check"></i>
                    My Appointments
                </a>
            </li>
            <li>
                <a href="Queues.html">
                    <i class="fa-solid fa-users"></i>
                    Queue Status
                </a>
            </li>
            <li>
                <a href="findClinics.html">
                    <i class="fa-solid fa-location-dot"></i>
                    Find Clinic
                </a>
            </li>
            <li>
                <a href="#">
                    <i class="fa-solid fa-bell"></i>
                    Notifications
                </a>
            </li>

        
        </ul>

        <section class="user-Section">
            <i class="fa-solid fa-user" style="padding: 5px;"></i>
            <section>
                <p class="name-Surname" id="name-Surname">Name Surname</p>
                <p class="user-Identity" style="padding: 3px">Patient</p>
            </section>
        </section>
    </aside>

        <main>
            <h2>Find a clinic-results</h2>
            <p class="FindClinic-Text">Search clinic by name or Location</p>

            <!-- Search Clinic Card -->
            <section class="search-Clinic">

                <section class="search-Row">
                    <section class="search-Bar">
                        <i class="fa-solid fa-magnifying-glass-location"></i>
                        <input id="clinicSearch" type="search" placeholder="Clinic name, Location, Suburb">

                </section>

                <template>
                    <section class="selected-clinic-card">
                        <p class="section-label">Selected Clinic</p>                    
                            <h3>Hillbrow Community Health Centre</h3>
                            <p class="clinic-meta"><i class="fa-solid fa-location-dot"></i> 2.3 km away</p>
                            <p class="clinic-meta"><i class="fa-solid fa-clock"></i> Open until 5 PM</p>
                    </section>
                </template>

            </section>

            <section class="quick-Actions">
                <button class="quick-btn" id="nearMeBtn">
                    <i class="fa-solid fa-location-crosshairs"></i>
                    Near Me
                </button>

                <button class="quick-btn" id="openNowBtn">
                    <i class="fa-solid fa-clock"></i>
                    Open Now
                </button>
            </section>
            <section class="clinic">
                <p class="section-label">Available Clinics</p>
                <section id="clinicResults" class="clinic-results">

                </section>
            </section>
        </main>

    </section>

    <script src="findClinic.js"></script> 
    <script type="module" src="firebase.js"></script>
</body>
</html>
