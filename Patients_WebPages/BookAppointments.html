<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="bookAppointments.css">
    
    <link rel="stylesheet" href="sidebar.css">
    
</head>
<body>

<header class="top-bar">
    <nav class="logo">
        <span class="logo-icon"></span>
        <span class="logo-name">Care Queue</span>
    </nav>
</header>

<main class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <nav>
            <ul>
                <li><a href="PatientDashboard.html"><i class="fa-solid fa-chart-bar"></i> Dashboard</a></li>

                <li><a href="BookAppointments.html"><i class="fa-solid fa-calendar-plus"></i> Book Appointment</a></li>

                <li><a href="MyAppointments.html"><i class="fa-solid fa-calendar-check"></i> My Appointments</a></li>

                <li><a href="Queues.html"><i class="fa-solid fa-users"></i> Queue Status</a></li>

                <li><a href="#"><i class="fa-solid fa-bell"></i> Notifications</a></li>
            </ul>
        </nav>

        <section class="user-section">
            <i class="fa-solid fa-user"></i>
            <address>
                <p class="name-surname" id="userName"></p>
                <p class="user-identity" id="userRole"></p>
            </address>
        </section>
    </aside>
        <main>
            <h2 id="pageTitle">Book Appointment</h2>
            <p class="FindClinic-Text">Find a clinic & select a slot</p>

            <!-- Search Clinic Card -->
            <section class="search-Clinic">

                <section class="search-Row">
                    <section class="search-Bar">
                        <i class="fa-solid fa-magnifying-glass-location" style="color: var(--color-brand);"></i>
                        <input id="clinicSearch" type="search" placeholder="Search clinic by name">
                    </section>
                


            </section>

            <section class="quick-Actions">
                <button class="quick-btn" id="nearMeBtn">
                    <i class="fa-solid fa-location-crosshairs"></i>
                    Near Me
                </button>

                <button class="quick-btn" id="openNowBtn">
                    <i class="fa-solid fa-clock"></i>
                    Open Now
                </button>
            </section>

            <section style="display: flex; gap: 20px;">
                <section class="clinic" style="width: 50%;">
                    <p class="section-label">Available Clinics</p>
                    <section id="clinicResults" class="clinic-results"></section>
                </section>

                <section style="display: flex; flex-direction: column; width: 50%;">
                    <section class="reason-card" >
                        <p class="section-label">Reason for Visit</p>

                        <select class="reason-select">
                            <option>Select reason</option>
                            <option>General Checkup</option>
                            <option>Vaccination</option>
                            <option>Follow-up</option>
                            <option>Prescription Refill</option>
                            <option>Family Planning</option>
                            <option>Child Health</option>
                            <option>Chronic Medication</option>
                            <option>Other</option>
                        </select>
                    </section>

                    <!-- Appointment Date & Time Selector -->
                    <section class="appointment-datetime" >
                        <p class="section-label">Select Date & Time</p>
                        <section class="datetime-picker">
                            <input type="date" id="appt-date" />
                        
                        </section>
                    </section>
                </section>

            </section>
            
            <!-- Time Slot Selection -->
            <section class="time-slot-card">
                <p class="section-label">Choose Time Slot</p>
                <p class="slot-subtext">Available slots for your selected date</p>

                <section id="timeSlots" class="time-slots"></section>

                <!-- Hidden input for storing selected time -->
                <input type="hidden" id="selectedTime">
            </section>

            <section class="hide">
                
            </section>
            <button class="confirm-Button">Confirm Appointment</button>

        </main>

    </section>

    <script type="module" src="bookAppointment.js"></script>
    <script type="module" src="firebase.js"></script>
</body>
</html>
